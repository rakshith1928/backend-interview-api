version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Pass your actual MONGO_URI in .env or hardcode here for testing
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=supersecretjwtkey_primetrade_123
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL where the frontend will send API requests. 
        # When accessing from host browser, localhost:5000 points to the backend container.
        - VITE_API_URL=http://localhost:5000/api/v1
    container_name: primetrade-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
